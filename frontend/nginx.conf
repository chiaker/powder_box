# Внутренний nginx фронт-контейнера.
# Раздаёт собранную статику Vite + умеет в SPA fallback (любой путь -> index.html).
# Внешний nginx (HestiaCP) проксирует на нас по 127.0.0.1:3000.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Длинный кэш для хешированных ассетов
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: любой неизвестный путь возвращает index.html, чтобы react-router
    # обрабатывал маршруты на клиенте.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Запросы на /api/* фронт делает по своему origin'у — их перехватывает
    # внешний nginx HestiaCP и проксирует на api-gateway. Сюда они доходить
    # не должны, но на всякий случай явно отдадим 404.
    location /api/ {
        return 404;
    }
}
