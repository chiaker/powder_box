name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-profile-service
          - resort-service
          - equipment-service
          - hotel-service
          - weather-service
          - skipass-service
          - lesson-service
          - activity-service
          - stats-service
          - notification-service

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ${{ matrix.service }}/requirements.txt
            requirements-test.txt

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r ../requirements-test.txt

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: pytest -v --tb=short

  deploy:
    name: Deploy to production
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Деплой только при push в main; PR-ы только тестируются.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 20m
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.APP_DIR }}"
            cd "$APP_DIR"

            echo "==> git pull"
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> docker compose up --build"
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --build --remove-orphans

            echo "==> waiting for api-gateway to become healthy"
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
                echo "api-gateway OK"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "api-gateway did NOT come up — see logs:"
                docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=200 api-gateway
                exit 1
              fi
              sleep 2
            done

            echo "==> docker image prune"
            docker image prune -f

            echo "==> deploy complete"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
