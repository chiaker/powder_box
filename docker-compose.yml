services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_PROXY_TARGET=http://api-gateway:8000
      - VITE_ADMIN_EMAILS=${ADMIN_EMAILS:-admin@example.com}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api-gateway
    networks:
      - powderbox

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./api-gateway/app:/app/app
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - USER_PROFILE_SERVICE_URL=http://user-profile-service:8002
      - EQUIPMENT_SERVICE_URL=http://equipment-service:8003
      - RESORT_SERVICE_URL=http://resort-service:8004
      - WEATHER_SERVICE_URL=http://weather-service:8005
      - HOTEL_SERVICE_URL=http://hotel-service:8006
      - SKIPASS_SERVICE_URL=http://skipass-service:8007
      - LESSON_SERVICE_URL=http://lesson-service:8008
      - ACTIVITY_SERVICE_URL=http://activity-service:8009
      - STATS_SERVICE_URL=http://stats-service:8010
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-admin@example.com}
    networks:
      - powderbox

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/auth.db
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    volumes:
      - ./auth-service/app:/app/app
      - auth_data:/app/data
    networks:
      - powderbox

  user-profile-service:
    build: ./user-profile-service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/profiles.db
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
    volumes:
      - ./user-profile-service/app:/app/app
      - profile_data:/app/data
    networks:
      - powderbox

  equipment-service:
    build: ./equipment-service
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/equipment.db
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
    volumes:
      - ./equipment-service/app:/app/app
      - equipment_data:/app/data
      - equipment_static:/app/static
    networks:
      - powderbox

  resort-service:
    build: ./resort-service
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/resorts.db
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
    volumes:
      - ./resort-service/app:/app/app
      - ./resort-service/static:/app/static
      - resort_data:/app/data
    networks:
      - powderbox

  weather-service:
    build: ./weather-service
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/weather.db
    volumes:
      - ./weather-service/app:/app/app
      - weather_data:/app/data
    networks:
      - powderbox

  hotel-service:
    build: ./hotel-service
    ports:
      - "8006:8006"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/hotels.db
    volumes:
      - ./hotel-service/app:/app/app
      - hotel_data:/app/data
    networks:
      - powderbox

  skipass-service:
    build: ./skipass-service
    ports:
      - "8007:8007"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/skipass.db
    volumes:
      - ./skipass-service/app:/app/app
      - skipass_data:/app/data
    networks:
      - powderbox

  lesson-service:
    build: ./lesson-service
    ports:
      - "8008:8008"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/lessons.db
    volumes:
      - ./lesson-service/app:/app/app
      - lesson_data:/app/data
    networks:
      - powderbox

  activity-service:
    build: ./activity-service
    ports:
      - "8009:8009"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/activities.db
    volumes:
      - ./activity-service/app:/app/app
      - activity_data:/app/data
    networks:
      - powderbox

  stats-service:
    build: ./stats-service
    ports:
      - "8010:8010"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/stats.db
    volumes:
      - ./stats-service/app:/app/app
      - stats_data:/app/data
    networks:
      - powderbox

volumes:
  frontend_node_modules:
  auth_data:
  equipment_static:
  profile_data:
  equipment_data:
  resort_data:
  weather_data:
  hotel_data:
  skipass_data:
  lesson_data:
  activity_data:
  stats_data:

networks:
  powderbox:
    driver: bridge
